<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Meeting</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="top-nav">
    <a class="nav-brand" th:href="@{/admin}">Voting System</a>

    <button class="nav-toggle" type="button" aria-label="Open menu"
            onclick="document.body.classList.toggle('nav-open')">
        ☰
    </button>

    <div class="nav-links">
        <a th:href="@{/admin}">Meetings</a>
        <a th:href="@{/admin/members}">Members</a>
        <a th:href="@{/votes}">Open votes</a>
        <a th:href="@{/logout}">Log out</a>
    </div>
</nav>

<div class="header">
    <h1>Edit Meeting</h1>
    <p>Update meeting details or remove the meeting.</p>
</div>

<div class="container">
    <div class="card">
        <form class="admin-create-meeting-form"
              th:action="@{/admin/meetings/{id}/update(id=${meeting.id})}"
              method="post">

            <label class="settings-field">
                <span>Meeting title</span>
                <input type="text" name="title" th:value="${meeting.title}" required>
            </label>

            <label class="settings-field">
                <span>Date</span>
                <input type="date" name="date" th:value="${meeting.date}" required>
            </label>

            <button type="submit">Save Changes</button>
        </form>
    </div>

    <div class="card">
        <form th:action="@{/admin/meetings/{id}/delete(id=${meeting.id})}"
              method="post"
              onsubmit="return confirm('Delete this meeting and all voting rounds, votes, attendance and codes?');">

            <button type="submit" class="danger-button">Delete Meeting</button>
        </form>
    </div>
</div>

</body>
</html>
