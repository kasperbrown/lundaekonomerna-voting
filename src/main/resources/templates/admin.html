<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Meetings</title>
    <link rel="stylesheet" href="/css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
</head>

<body>

    <nav class="top-nav">
        <a class="nav-brand" th:href="@{/admin}">Voting System</a>

        <button class="nav-toggle" type="button" aria-label="Open menu"
            onclick="document.body.classList.toggle('nav-open')">
            ☰
        </button>

        <div class="nav-links">
            <a th:href="@{/admin}">Meetings</a>
            <a th:href="@{/admin/members}">Members</a>
            <a th:href="@{/votes}">Open votes</a>
            <a th:href="@{/logout}">Log out</a>
        </div>
    </nav>

    <div class="header">
        <h1>Meetings</h1>
        <p>Create and manage voting meetings</p>
    </div>

    <div class="container">

        <div class="card compact-card">
            <div class="section-header">
                <div>
                    <h2>Create Meeting</h2>
                    <p class="muted">Set up a new meeting before creating voting rounds.</p>
                </div>
            </div>

            <form method="post" action="/admin/meetings" class="admin-create-meeting-form">
                <label class="settings-field">
                    <span>Meeting title</span>
                    <input name="title" placeholder="Meeting title" required>
                </label>

                <label class="settings-field">
                    <span>Date</span>
                    <input name="date" type="date" required>
                </label>

                <button type="submit">Create Meeting</button>
            </form>
        </div>

        <div class="card compact-card">
            <div class="section-header">
                <div>
                    <h2>All Meetings</h2>
                    <p class="muted">Open a meeting to manage attendance, voting rounds and codes.</p>
                </div>

                <span class="count-pill">
                    Total:
                    <strong th:text="${#lists.size(meetings)}"></strong>
                </span>
            </div>

            <div class="admin-meeting-list">

                <div th:if="${#lists.isEmpty(meetings)}" class="empty-rounds-box">
                    No meetings have been created yet.
                </div>

                <div class="admin-meeting-row clickable-meeting-row" th:each="meeting : ${meetings}"
                    th:onclick="|window.location.href='/admin/meetings/${meeting.id}'|">

                    <div>
                        <h3 th:text="${meeting.title}"></h3>
                        <p th:text="${meeting.date}"></p>
                    </div>

                    <div class="row-actions" onclick="event.stopPropagation();">
                        <a class="meeting-action-button primary-action"
                            th:href="@{/admin/meetings/{id}(id=${meeting.id})}">
                            Open
                        </a>

                        <a class="meeting-action-button secondary-action"
                            th:href="@{/admin/meetings/{id}/edit(id=${meeting.id})}">
                            Edit
                        </a>

                        <form method="post" th:action="@{/admin/meetings/{id}/delete(id=${meeting.id})}"
                            onsubmit="return confirm('Delete this meeting and all related voting data?');">
                            <button class="meeting-action-button danger-action" type="submit">
                                Remove
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script src="/js/scroll-preserve.js"></script>

</body>

</html>
